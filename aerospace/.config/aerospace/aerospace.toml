# AeroSpace config
# Active path: ~/.config/aerospace/aerospace.toml

config-version = 2

start-at-login = true
after-startup-command = []

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'accordion'
default-root-container-orientation = 'auto'
accordion-padding = 30

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

# Keep the main workspaces visible even when they are empty.
persistent-workspaces = ['1', '2', '3', '4', '5', 'M']

[key-mapping]
preset = 'colemak'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus: Colemak-friendly h / n / e / i = left / down / up / right
alt-h = 'focus left'
alt-n = 'focus down'
alt-e = 'focus up'
alt-i = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-n = 'move down'
alt-shift-e = 'move up'
alt-shift-i = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Fullscreen
alt-f = 'fullscreen'
alt-shift-f = 'macos-native-fullscreen'

# Workspaces
# 1 = browser, 2 = terminal, 3 = chat, 4 = code, 5 = misc/web apps, M = music
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-m = 'workspace M'

# Send window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-m = 'move-node-to-workspace M'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Maintenance mode
alt-shift-backtick = 'mode service'

[mode.service.binding]
esc = 'mode main'
r = ['reload-config', 'mode main']
b = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-n = ['join-with down', 'mode main']
alt-shift-e = ['join-with up', 'mode main']
alt-shift-i = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.tdesktop.Telegram'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.openai.atlas'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace M'
